<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORION — Surgical Co-Pilot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e8ecf1;
      color: #1a1a2e;
      font-family: Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Left column: surgical video + overlays ── */
    #display-area {
      flex: 0 0 70%;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    /* All layers are stacked absolutely inside the display area */
    #display-area > * {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #surgical-video {
      object-fit: cover;
      z-index: 0;
    }

    #ct-canvas {
      z-index: 1;
      display: none;
      opacity: 0.85;
      pointer-events: none;
    }

    #ar-canvas {
      z-index: 2;
      display: none;
      pointer-events: none;
    }

    #clinical-panel {
      z-index: 3;
      pointer-events: none;
    }

    /* ── Right column: glassmorphism panel ── */
    #right-panel {
      flex: 0 0 30%;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-left: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: -6px 0 40px rgba(0, 0, 0, 0.07);
      overflow: hidden;
    }

    /* ── Orb section — top 20% of right panel ── */
    #orb-section {
      flex: 0 0 20%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    #orion-orb {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      cursor: pointer;
      background: radial-gradient(circle at 36% 30%, #ffffff 0%, #dce8f5 50%, #b8cee8 100%);
      box-shadow:
        0 4px 18px rgba(100, 149, 237, 0.22),
        inset 0 1px 3px rgba(255, 255, 255, 0.9);
      transition: transform 0.2s ease;
      user-select: none;
      -webkit-user-select: none;
    }

    #orion-orb:hover  { transform: scale(1.05); }
    #orion-orb:active { transform: scale(0.97); }

    /* Connected / listening */
    #orion-orb.connected {
      background: radial-gradient(circle at 36% 30%, #ffffff 0%, #b3e5fc 42%, #4fc3f7 100%);
      box-shadow:
        0 0 30px rgba(79, 195, 247, 0.50),
        inset 0 1px 3px rgba(255, 255, 255, 0.7);
      animation: orb-breathe 2.6s ease-in-out infinite;
    }

    /* ORION speaking */
    #orion-orb.speaking {
      background: radial-gradient(circle at 36% 30%, #ffffff 0%, #80deea 38%, #00bcd4 100%);
      box-shadow:
        0 0 46px rgba(0, 188, 212, 0.68),
        inset 0 1px 3px rgba(255, 255, 255, 0.6);
      animation: orb-pulse 0.65s ease-in-out infinite alternate;
    }

    @keyframes orb-breathe {
      0%, 100% { box-shadow: 0 0 28px rgba(79, 195, 247, 0.48), inset 0 1px 3px rgba(255,255,255,0.7); }
      50%       { box-shadow: 0 0 46px rgba(79, 195, 247, 0.80), inset 0 1px 3px rgba(255,255,255,0.7); }
    }

    @keyframes orb-pulse {
      from { box-shadow: 0 0 30px rgba(0, 188, 212, 0.50), inset 0 1px 3px rgba(255,255,255,0.6); transform: scale(1); }
      to   { box-shadow: 0 0 56px rgba(0, 188, 212, 0.82), inset 0 1px 3px rgba(255,255,255,0.6); transform: scale(1.07); }
    }

    #orion-status-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #9aa3b5;
    }

    #orion-status-label.active { color: #0288d1; }

    /* ── Content section — bottom 80% ── */
    #content-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Agent routing log */
    #routing-panel {
      flex: 0 0 auto;
      max-height: 36%;
      overflow-y: auto;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    #routing-panel-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #b0b8c8;
      margin-bottom: 8px;
    }

    .routing-event {
      font-size: 11px;
      padding: 3px 0 3px 9px;
      border-left: 2px solid #d8dde8;
      color: #7b8299;
      margin-bottom: 3px;
      line-height: 1.4;
    }

    .routing-event.transfer  { border-left-color: #ff9800; color: #9c6000; }
    .routing-event.tool-call { border-left-color: #7c3aed; color: #5b1fa8; }
    .routing-event.turn      { border-left-color: #0288d1; color: #025f99; }
    .routing-event.error     { border-left-color: #e53935; color: #b71c1c; }

    /* Transcript */
    #transcript-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 12px 16px;
    }

    #transcript-panel-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: #b0b8c8;
      margin-bottom: 10px;
      flex-shrink: 0;
    }

    #transcript-log {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .transcript-entry {
      font-size: 12px;
      line-height: 1.5;
      padding: 8px 11px;
      border-radius: 9px;
      max-width: 92%;
    }

    .transcript-entry .speaker {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 3px;
      opacity: 0.55;
    }

    .transcript-entry.surgeon {
      background: rgba(2, 136, 209, 0.08);
      border: 1px solid rgba(2, 136, 209, 0.15);
      color: #014e75;
      align-self: flex-end;
    }

    .transcript-entry.orion {
      background: rgba(0, 188, 212, 0.07);
      border: 1px solid rgba(0, 188, 212, 0.15);
      color: #00636e;
      align-self: flex-start;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.12); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- ── Left 70%: surgical video + agent overlays ── -->
  <div id="display-area">

    <!-- Layer 0: surgical video background -->
    <video id="surgical-video" autoplay muted loop playsinline></video>

    <!-- Layer 1: CT scan overlay -->
    <canvas id="ct-canvas"></canvas>

    <!-- Layer 2: Three.js 3D anatomy model -->
    <canvas id="ar-canvas"></canvas>

    <!-- Layer 3: clinical data cards (managed by clinical-panel.js) -->
    <div id="clinical-panel"></div>

  </div>

  <!-- ── Right 30%: glassmorphism panel ── -->
  <div id="right-panel">

    <!-- Top 20%: voice orb + status -->
    <div id="orb-section">
      <div id="orion-orb" title="Click to connect / disconnect ORION"></div>
      <span id="orion-status-label">ORION offline</span>
    </div>

    <!-- Bottom 80%: agent activity + transcript -->
    <div id="content-panel">

      <div id="routing-panel">
        <div id="routing-panel-label">Agent activity</div>
        <div id="routing-log">
          <div class="routing-event">Waiting for connection…</div>
        </div>
      </div>

      <div id="transcript-panel">
        <div id="transcript-panel-label">Conversation</div>
        <div id="transcript-log"></div>
      </div>

    </div>

  </div>

  <!-- ── Scripts ── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

  <script src="/static/js/ct-viewer.js"></script>
  <script src="/static/js/anatomy-3d.js"></script>
  <script src="/static/js/clinical-panel.js"></script>

  <script type="module" src="/static/js/app.js"></script>

</body>
</html>
